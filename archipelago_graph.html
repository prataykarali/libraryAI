<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Archipelago · Knowledge Graph</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--s1:#111118;--s2:#181820;
  --bd:rgba(255,255,255,.07);
  --tx:#e8e8f2;--mu:#6060a0;
  --req:#a374ff;--enb:#00e5b0;--use:#00b4d8;
  --ext:#ff9f43;--pof:#ff6b9d;--ctr:#ff5e5e;--evl:#f9c74f;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--tx);
  font-family:'Inter',sans-serif;overflow:hidden;user-select:none}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;
  display:flex;align-items:center;gap:14px;padding:0 20px;
  background:rgba(9,9,15,.95);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bd)}
.logo{font-size:15px;font-weight:700;
  background:linear-gradient(125deg,#a374ff,#00e5b0 70%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo em{-webkit-text-fill-color:var(--mu);font-style:normal;font-weight:300}
#sw{flex:1;max-width:320px;position:relative}
#srch{width:100%;padding:7px 12px 7px 32px;background:var(--s2);
  border:1px solid var(--bd);border-radius:8px;color:var(--tx);
  font-family:inherit;font-size:12px;outline:none;transition:border-color .2s,box-shadow .2s}
#srch:focus{border-color:rgba(163,116,255,.5);box-shadow:0 0 0 3px rgba(163,116,255,.12)}
#srch::placeholder{color:var(--mu)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--mu);font-size:13px;pointer-events:none}
#leg{display:flex;gap:12px;align-items:center;margin-left:auto}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mu);white-space:nowrap}
.ll{height:2px;width:20px;border-radius:2px}

/* CHIPS */
#chips{position:fixed;top:60px;left:14px;z-index:190;display:flex;gap:5px;flex-wrap:wrap;padding-top:5px}
.chip{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:500;cursor:pointer;
  border:1px solid var(--bd);color:var(--mu);background:var(--s2);transition:all .15s}
.chip:hover{color:var(--tx)}
.chip.on{color:#fff}
.chip[data-r="all"].on{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.22)}
.chip[data-r="requires"].on{background:rgba(163,116,255,.2);border-color:var(--req);color:#c8aaff}
.chip[data-r="enables"].on{background:rgba(0,229,176,.15);border-color:var(--enb);color:var(--enb)}
.chip[data-r="uses"].on{background:rgba(0,180,216,.15);border-color:var(--use);color:var(--use)}
.chip[data-r="extends"].on{background:rgba(255,159,67,.15);border-color:var(--ext);color:var(--ext)}
.chip[data-r="part_of"].on{background:rgba(255,107,157,.15);border-color:var(--pof);color:var(--pof)}
.chip[data-r="contrasts_with"].on{background:rgba(255,94,94,.15);border-color:var(--ctr);color:var(--ctr)}
.chip[data-r="evaluated_by"].on{background:rgba(249,199,79,.15);border-color:var(--evl);color:var(--evl)}

/* GRAPH */
#gw{position:fixed;inset:52px 0 0 0;transition:right .32s cubic-bezier(.4,0,.2,1)}
#gw.po{right:330px}
svg#g{width:100%;height:100%;display:block;cursor:grab}
svg#g:active{cursor:grabbing}

.lnk{fill:none;stroke-width:1.5;stroke-linecap:round}
.lnk.requires{stroke:var(--req)}.lnk.enables{stroke:var(--enb)}
.lnk.uses{stroke:var(--use)}.lnk.extends{stroke:var(--ext)}
.lnk.part_of{stroke:var(--pof)}.lnk.contrasts_with{stroke:var(--ctr)}
.lnk.evaluated_by{stroke:var(--evl)}.lnk.dim{opacity:.04!important}

.ng{cursor:pointer}
.ng .core{transition:filter .2s}
.ng:hover .core,.ng.sel .core{filter:brightness(1.7) saturate(1.4)!important}
.ng.dim{opacity:.07}
.ng .ring{transition:opacity .25s;opacity:0}
.ng.sel .ring{opacity:1}
.lbl{font-family:'Inter',sans-serif;font-size:9.5px;fill:var(--tx);
  pointer-events:none;paint-order:stroke;stroke:var(--bg);stroke-width:3px;
  stroke-linejoin:round;font-weight:500}

/* PANEL */
#panel{position:fixed;top:52px;right:0;bottom:0;width:330px;z-index:180;
  background:rgba(9,9,15,.98);backdrop-filter:blur(28px);
  border-left:1px solid var(--bd);
  transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column}
#panel.open{transform:translateX(0)}
#pcls{position:absolute;top:11px;right:11px;width:26px;height:26px;border-radius:6px;
  background:var(--s2);border:1px solid var(--bd);color:var(--mu);cursor:pointer;
  font-size:12px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;z-index:1}
#pcls:hover{background:rgba(255,255,255,.1);color:var(--tx)}
#pc{padding:20px 16px;overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}

.pbadge{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:9px;font-weight:700;
  letter-spacing:.6px;text-transform:uppercase;margin-bottom:11px}
.pb-beginner{background:rgba(0,229,176,.12);color:#00e5b0;border:1px solid rgba(0,229,176,.3)}
.pb-intermediate{background:rgba(163,116,255,.12);color:#c8aaff;border:1px solid rgba(163,116,255,.3)}
.pb-advanced{background:rgba(255,107,157,.12);color:#ff6b9d;border:1px solid rgba(255,107,157,.3)}

#pname{font-size:17px;font-weight:700;line-height:1.25;margin-bottom:8px}
#psumm{font-size:12px;line-height:1.75;color:var(--mu);margin-bottom:15px}
.pmeta{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:15px}
.mcard{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:9px}
.mlbl{font-size:9px;letter-spacing:.7px;text-transform:uppercase;color:var(--mu);margin-bottom:2px}
.mval{font-size:11.5px;font-weight:600}
.stitle{font-size:9px;letter-spacing:.7px;text-transform:uppercase;color:var(--mu);margin-bottom:6px;font-weight:600}
.elist{list-style:none;display:flex;flex-direction:column;gap:4px;margin-bottom:13px}
.ei{display:flex;align-items:center;gap:7px;padding:7px 9px;
  border-radius:7px;cursor:pointer;background:var(--s2);border:1px solid var(--bd);
  font-size:11px;transition:background .12s,border-color .12s}
.ei:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.15)}
.earr{font-size:12px;flex-shrink:0}
.ename{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.erel{font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;opacity:.55;flex-shrink:0}
.src{font-size:9.5px;font-family:'JetBrains Mono',monospace;color:var(--mu);
  background:var(--s2);border:1px solid var(--bd);border-radius:7px;
  padding:8px;word-break:break-all;line-height:1.65}

/* TOOLTIP */
#tip{position:fixed;z-index:500;
  background:rgba(9,9,15,.98);backdrop-filter:blur(16px);
  border:1px solid var(--bd);border-radius:9px;padding:9px 13px;
  font-size:12px;pointer-events:none;opacity:0;transition:opacity .1s;max-width:240px}
#tip.v{opacity:1}
#tname{font-weight:700;margin-bottom:2px}
#ttype{font-size:10px;color:var(--mu)}

/* CONTROLS */
#ctrls{position:fixed;bottom:56px;right:14px;z-index:190;display:flex;flex-direction:column;gap:4px}
.cb{width:32px;height:32px;border-radius:7px;background:var(--s2);border:1px solid var(--bd);
  color:var(--mu);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.cb:hover{background:rgba(255,255,255,.08);color:var(--tx)}

/* STATS */
#sbar{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:190;
  display:flex;background:rgba(9,9,15,.92);backdrop-filter:blur(14px);
  border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.sp{padding:6px 14px;font-size:10px;color:var(--mu);display:flex;align-items:center;gap:4px;border-right:1px solid var(--bd)}
.sp:last-child{border-right:none}
.sp strong{color:var(--tx);font-weight:600;font-size:12px}

#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<header id="hdr">
  <div class="logo">Archipelago <em>/</em> Knowledge Graph</div>
  <div id="sw">
    <span class="si">⌕</span>
    <input id="srch" type="text" placeholder="Search 113 concepts…" autocomplete="off"/>
  </div>
  <div id="leg">
    <div class="li"><div class="ll" style="background:#a374ff;box-shadow:0 0 5px rgba(163,116,255,.7)"></div>REQUIRES</div>
    <div class="li"><div class="ll" style="background:#00e5b0;box-shadow:0 0 5px rgba(0,229,176,.7)"></div>ENABLES</div>
    <div class="li"><div class="ll" style="background:#00b4d8;box-shadow:0 0 5px rgba(0,180,216,.6)"></div>USES</div>
    <div class="li"><div class="ll" style="background:#ff9f43;box-shadow:0 0 5px rgba(255,159,67,.6)"></div>EXTENDS</div>
  </div>
</header>

<div id="chips">
  <div class="chip on" data-r="all">All</div>
  <div class="chip" data-r="requires">REQUIRES</div>
  <div class="chip" data-r="enables">ENABLES</div>
  <div class="chip" data-r="uses">USES</div>
  <div class="chip" data-r="extends">EXTENDS</div>
  <div class="chip" data-r="part_of">PART OF</div>
  <div class="chip" data-r="contrasts_with">CONTRASTS</div>
  <div class="chip" data-r="evaluated_by">EVALUATED BY</div>
</div>

<div id="gw">
  <svg id="g">
    <defs>
      <marker id="mr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0L0,6L7,3z" fill="#a374ff"/></marker>
      <marker id="me" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0L0,6L7,3z" fill="#00e5b0"/></marker>
      <marker id="mu" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0L0,6L7,3z" fill="#00b4d8"/></marker>
      <marker id="mx" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0L0,6L7,3z" fill="#ff9f43"/></marker>
      <marker id="mp" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0L0,6L7,3z" fill="#ff6b9d"/></marker>
      <marker id="mc" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0L0,6L7,3z" fill="#ff5e5e"/></marker>
      <marker id="mv" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0L0,6L7,3z" fill="#f9c74f"/></marker>
      <filter id="fr" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="fe" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="fu" x="-70%" y="-70%" width="240%" height="240%">
        <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="fx" x="-70%" y="-70%" width="240%" height="240%">
        <feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="gnhub" x="-120%" y="-120%" width="340%" height="340%">
        <feGaussianBlur stdDeviation="11" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="gnhi" x="-90%" y="-90%" width="280%" height="280%">
        <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="gnlo" x="-70%" y="-70%" width="240%" height="240%">
        <feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
  </svg>
</div>

<div id="panel">
  <button id="pcls">✕</button>
  <div id="pc">
    <div id="pbdg" class="pbadge pb-intermediate">intermediate</div>
    <div id="pname"></div>
    <div id="psumm"></div>
    <div class="pmeta">
      <div class="mcard"><div class="mlbl">Type</div><div id="ptype" class="mval">—</div></div>
      <div class="mcard"><div class="mlbl">Difficulty</div><div id="pdiff" class="mval">—</div></div>
    </div>
    <div id="psr" style="display:none"><div class="stitle" style="color:#a374ff">↑ REQUIRES</div><ul id="plr" class="elist"></ul></div>
    <div id="pse" style="display:none"><div class="stitle" style="color:#00e5b0">↓ ENABLES</div><ul id="ple" class="elist"></ul></div>
    <div id="psu" style="display:none"><div class="stitle" style="color:#00b4d8">◈ USES</div><ul id="plu" class="elist"></ul></div>
    <div id="psx" style="display:none"><div class="stitle" style="color:#ff9f43">⤳ EXTENDS</div><ul id="plx" class="elist"></ul></div>
    <div id="psrc-sec" style="display:none"><div class="stitle">📄 Source</div><div id="psrc" class="src"></div></div>
  </div>
</div>

<div id="tip"><div id="tname"></div><div id="ttype"></div></div>

<div id="ctrls">
  <button class="cb" id="zi">+</button>
  <button class="cb" id="zo">−</button>
  <button class="cb" id="zr" style="font-size:11px">⊙</button>
</div>

<div id="sbar">
  <div class="sp"><strong id="sn">113</strong>&nbsp;concepts</div>
  <div class="sp"><strong id="se">317</strong>&nbsp;edges</div>
  <div class="sp"><strong id="sp2">—</strong>&nbsp;papers</div>
</div>

"extends"},{"source":"rag_token","target":"retrieval_augmented_generation","rel":"uses"},{"source":"rag_token","target":"factuality_check","rel":"uses"},{"source":"model_training","target":"attention_heads","rel":"uses"},{"source":"key_value_pair","target":"query","rel":"uses"},{"source":"key_value_pair","target":"output","rel":"uses"},{"source":"linear_transformation","target":"work","rel":"uses"},{"source":"attention_heads","target":"rnn","rel":"contrasts_with"},{"source":"soft_targeting","target":"diffuse_distributions","rel":"uses"},{"source":"soft_targeting","target":"sequence_level_targets","rel":"uses"},{"source":"diffuse_distributions","target":"soft_targeting","rel":"uses"},{"source":"diffuse_distributions","target":"hard_targeted_methods","rel":"uses"},{"source":"sequence_level_targets","target":"soft_targeting","rel":"uses"},{"source":"sequence_level_targets","target":"hard_targeted_methods","rel":"uses"},{"source":"calibration_aware_training","target":"soft_targeting","rel":"uses"},{"source":"calibration_aware_training","target":"hard_targeted_methods","rel":"uses"},{"source":"wasserstein_1_distance_metric","target":"reference_distribution","rel":"part_of"},{"source":"string_seed_of_thought","target":"open_ended_random_generation_requests","rel":"uses"},{"source":"open_ended_random_generation_requests","target":"string_seed_of_thought","rel":"evaluated_by"},{"source":"structured_sampling","target":"string_seed_of_thought","rel":"uses"},{"source":"hard_target_fine_tuning","target":"string_seed_of_thought","rel":"uses"},{"source":"hard_target_fine_tuning","target":"fine_tuning","rel":"contrasts_with"},{"source":"stochastic_support_expansion","target":"hard_target_fine_tuning","rel":"extends"},{"source":"mcq_transfer","target":"open_ended_random_generation","rel":"uses"},{"source":"mcq_transfer","target":"hard_target_fine_tuning","rel":"extends"},{"source":"answer_position_balance","target":"open_ended_random_generation","rel":"contrasts_with"},{"source":"answer_position_balance","target":"hard_target_fine_tuning","rel":"uses"},{"source":"prefix_mass","target":"attention_mechanism","rel":"uses"},{"source":"large_language_models","target":"chain_of_thought_prompting","rel":"uses"},{"source":"react_reason_and_act","target":"chain_of_thought_prompting","rel":"uses"},{"source":"constitutional_ai_ai_feedback","target":"chain_of_thought_prompting","rel":"extends"}];

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
/* ═══════════════════════════════════════
   STARFIELD
═══════════════════════════════════════ */
(()=>{
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  let st=[];
  const rsz=()=>{
    c.width=innerWidth;c.height=innerHeight;
    st=Array.from({length:200},()=>({
      x:Math.random()*c.width,y:Math.random()*c.height,
      r:Math.random()*1.3+.2,a:Math.random()*.4+.06,
      da:(Math.random()-.5)*.003
    }));
  };
  const draw=()=>{
    ctx.clearRect(0,0,c.width,c.height);
    st.forEach(s=>{s.a+=s.da;if(s.a<.05||s.a>.55)s.da*=-1;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,180,255,${s.a})`;ctx.fill();});
    requestAnimationFrame(draw);
  };
  rsz();addEventListener('resize',rsz);draw();
})();

/* ═══════════════════════════════════════
   GRAPH
═══════════════════════════════════════ */
(()=>{
  const nodes=NODES, edges=EDGES;

  // Compute degree
  const deg={};
  edges.forEach(e=>{deg[e.source]=(deg[e.source]||0)+1;deg[e.target]=(deg[e.target]||0)+1;});
  nodes.forEach(n=>{n._d=deg[n.id]||0;});

  const nm={};nodes.forEach(n=>nm[n.id]=n);
  const rid=x=>typeof x==='object'?x.id:x;

  const CLRS={requires:'#a374ff',enables:'#00e5b0',uses:'#00b4d8',
    extends:'#ff9f43',part_of:'#ff6b9d',contrasts_with:'#ff5e5e',evaluated_by:'#f9c74f'};
  const MARKS={requires:'mr',enables:'me',uses:'mu',extends:'mx',
    part_of:'mp',contrasts_with:'mc',evaluated_by:'mv'};
  const FILTS={requires:'fr',enables:'fe',uses:'fu',extends:'fx',
    part_of:'fx',contrasts_with:'fx',evaluated_by:'fx'};
  const TCLRS={method:'#a374ff',technique:'#38d9ff',definition:'#d4d4ff',
    theory:'#ff9f43',metric:'#f9c74f',result:'#ff6b9d',dataset:'#b8c0ff'};

  const nR=d=>d._d>=30?20:d._d>=15?14:d._d>=8?10:d._d>=4?7:5;
  const nC=d=>d._d>=30?'#ffcc00':d._d>=15?'#f0f0ff':(TCLRS[d.type]||'#c0c0e0');
  const nF=d=>d._d>=30?'url(#gnhub)':d._d>=10?'url(#gnhi)':'url(#gnlo)';

  const svg=d3.select('#g');
  const gw=document.getElementById('gw');
  let W=gw.clientWidth, H=gw.clientHeight;
  const root=svg.append('g');

  const zoom=d3.zoom().scaleExtent([.03,8])
    .on('zoom',ev=>root.attr('transform',ev.transform));
  svg.call(zoom).on('dblclick.zoom',null);

  const resetV=()=>svg.transition().duration(700)
    .call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2).scale(.55));

  document.getElementById('zi').onclick=()=>svg.transition().call(zoom.scaleBy,1.35);
  document.getElementById('zo').onclick=()=>svg.transition().call(zoom.scaleBy,1/1.35);
  document.getElementById('zr').onclick=resetV;

  const sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(edges).id(d=>d.id)
      .distance(d=>{
        const s=typeof d.source==='object'?d.source:nm[d.source];
        const t=typeof d.target==='object'?d.target:nm[d.target];
        return 95+(s?._d||0)*2.5+(t?._d||0)*2.5;
      }).strength(.4))
    .force('charge',d3.forceManyBody().strength(d=>-220-d._d*16))
    .force('center',d3.forceCenter(0,0))
    .force('collide',d3.forceCollide().radius(d=>nR(d)+22).strength(.8))
    .alphaDecay(.02);

  // Links
  const lg=root.append('g');
  const lSel=lg.selectAll('.lnk')
    .data(edges).join('line')
    .attr('class',d=>`lnk ${d.rel}`)
    .attr('marker-end',d=>`url(#${MARKS[d.rel]||'mu'})`)
    .attr('filter',d=>`url(#${FILTS[d.rel]||'fu'})`)
    .attr('opacity',.72);

  // Nodes
  const ng=root.append('g');
  const nSel=ng.selectAll('.ng')
    .data(nodes).join('g')
    .attr('class','ng')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag', (e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on('end',  (e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

  nSel.append('circle').attr('class','ring')
    .attr('r',d=>nR(d)+9).attr('fill','none')
    .attr('stroke',d=>nC(d)).attr('stroke-width',2).attr('opacity',0);

  nSel.append('circle').attr('class','core')
    .attr('r',d=>nR(d))
    .attr('fill',d=>nC(d))
    .attr('filter',d=>nF(d))
    .attr('stroke','rgba(255,255,255,.1)').attr('stroke-width',.8);

  nSel.filter(d=>d._d>=4).append('text').attr('class','lbl')
    .attr('dy',d=>nR(d)+12).attr('text-anchor','middle')
    .text(d=>d.name.length>22?d.name.slice(0,21)+'…':d.name);

  // Tooltip
  const tip=document.getElementById('tip');
  nSel
    .on('mousemove',(e,d)=>{
      tip.style.left=(e.clientX+16)+'px';
      tip.style.top=(e.clientY-8)+'px';
      document.getElementById('tname').textContent=d.name;
      document.getElementById('ttype').textContent=d.type+' · '+d.difficulty+' · '+d._d+' edges';
      tip.classList.add('v');
    })
    .on('mouseleave',()=>tip.classList.remove('v'))
    .on('click',(e,d)=>{e.stopPropagation();openPanel(d);});

  svg.on('click',()=>{closePanel();clearHL();});

  sim.on('tick',()=>{
    lSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    nSel.attr('transform',d=>`translate(${d.x},${d.y})`);
  });

  setTimeout(()=>{W=gw.clientWidth;H=gw.clientHeight;resetV();},150);
  addEventListener('resize',()=>{W=gw.clientWidth;H=gw.clientHeight;});

  /* ── Panel ─────────────── */
  const panel=document.getElementById('panel');

  function makeList(listId,secId,items,clr,icon){
    const sec=document.getElementById(secId);
    const ul=document.getElementById(listId);
    ul.innerHTML='';
    if(!items.length){sec.style.display='none';return;}
    items.slice(0,10).forEach(({node,arrow,rel})=>{
      if(!node)return;
      const li=document.createElement('li');li.className='ei';
      li.innerHTML=`<span class="earr" style="color:${clr}">${icon}</span>`+
        `<span class="ename">${node.name}</span>`+
        `<span class="erel" style="color:${clr}">${arrow}${rel}</span>`;
      li.onclick=ev=>{ev.stopPropagation();openPanel(node);};
      ul.appendChild(li);
    });
    sec.style.display='';
  }

  function openPanel(d){
    document.getElementById('pbdg').textContent=d.difficulty||'intermediate';
    document.getElementById('pbdg').className='pbadge pb-'+(d.difficulty||'intermediate');
    document.getElementById('pname').textContent=d.name;
    document.getElementById('psumm').textContent=d.summary||'No summary available.';
    document.getElementById('ptype').textContent=d.type||'—';
    document.getElementById('pdiff').textContent=d.difficulty||'—';

    const cats={requires:[],enables:[],uses:[],extends:[]};
    edges.forEach(l=>{
      const s=rid(l.source),t=rid(l.target),r=l.rel;
      if(cats[r]===undefined)return;
      if(s===d.id){const n=nm[t];if(n)cats[r].push({node:n,arrow:'→',rel:r});}
      if(t===d.id){const n=nm[s];if(n)cats[r].push({node:n,arrow:'←',rel:r});}
    });

    makeList('plr','psr',cats.requires,'#a374ff','↑');
    makeList('ple','pse',cats.enables, '#00e5b0','↓');
    makeList('plu','psu',cats.uses,    '#00b4d8','◈');
    makeList('plx','psx',cats.extends, '#ff9f43','⤳');

    const s=document.getElementById('psrc-sec');
    if(d.sources){document.getElementById('psrc').textContent=d.sources;s.style.display='';}
    else s.style.display='none';

    panel.classList.add('open');
    gw.classList.add('po');
    highlightNode(d);
  }

  function closePanel(){panel.classList.remove('open');gw.classList.remove('po');}
  document.getElementById('pcls').onclick=()=>{closePanel();clearHL();};

  function highlightNode(d){
    const conn=new Set([d.id]);
    edges.forEach(l=>{const s=rid(l.source),t=rid(l.target);if(s===d.id||t===d.id){conn.add(s);conn.add(t);}});
    nSel.classed('dim',nd=>!conn.has(nd.id)).classed('sel',nd=>nd.id===d.id);
    lSel.classed('dim',l=>rid(l.source)!==d.id&&rid(l.target)!==d.id);
  }
  function clearHL(){nSel.classed('dim',false).classed('sel',false);lSel.classed('dim',false);}

  /* ── Search ─── */
  document.getElementById('srch').addEventListener('input',function(){
    const q=this.value.trim().toLowerCase();
    if(!q){clearHL();return;}
    const m=nodes.filter(n=>n.name.toLowerCase().includes(q));
    const ms=new Set(m.map(n=>n.id));
    nSel.classed('dim',nd=>!ms.has(nd.id));
    lSel.classed('dim',true);
    if(m.length===1)openPanel(m[0]);
  });

  /* ── Filter chips ─── */
  document.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const r=chip.dataset.r;
      document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
      chip.classList.add('on');
      lSel.style('display',r==='all'?null:l=>l.rel===r?null:'none');
    });
  });

  /* ── Stats ─── */
  const papers=new Set(nodes.map(n=>(n.sources||'').split(':')[0]).filter(Boolean));
  document.getElementById('sn').textContent=nodes.length;
  document.getElementById('se').textContent=edges.length;
  document.getElementById('sp2').textContent=papers.size;
})();
</script>
</body>
